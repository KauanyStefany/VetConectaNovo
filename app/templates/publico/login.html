{% extends "base_publica.html" %}
{% block head %}
<title>Login - VetConecta</title>
<!-- <link rel="stylesheet" href="/static/css/login.css"> -->
{% endblock %}
{% block conteudo %}
<div class="container">
  <div class="row">
    <div class="">
      <div class="login-box bg-white p-4 rounded shadow">
        <div class="text-center mb-4">
          <h5 class="mb-4 fw-semibold login-title">Login</h5>
        </div>

        <form action="/login" method="post">
          {% if redirect: %}
          <input type="hidden" name="next" value="{{ redirect }}">
          {% endif %}
          <div class="mb-3 text-start">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Digite seu email" required name="email">
          </div>
          <div class="mb-3 text-start">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required name="senha">
          </div>
          <button type="submit" class="btn btn-login w-100">Entrar</button>
          <a href="/esqueci-senha" class="btn btn-link">Esqueci minha senha</a>
        </form>
        <div class="mt-3 text-center">
          <span>Não tem uma conta cadastrada? </span>
          <a href="/cadastro" class="text-primary fw-semibold">Cadastre-se!</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
